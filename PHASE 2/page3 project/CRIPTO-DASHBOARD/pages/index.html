<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CryptoDash Pro</title>

    <!--
    Dashboard CSS

    Is file me pura dashboard
    design hoga.
    -->

    <link rel="stylesheet"
          href="../css/dashboard.css">

</head>

<body>

    <!--
    ==================================
    SIDEBAR
    ==================================

    Left side navigation panel.

    Future:
    Watchlist
    Portfolio
    News
    Converter
    -->

    <aside class="sidebar">

        <h2>🚀 CryptoDash Pro</h2>

        <nav>

            <ul>

                <li>Dashboard</li>

                <li>Watchlist</li>

                <li>Portfolio</li>

                <li>Markets</li>

                <li>News</li>

                <li>Converter</li>

                <li>Settings</li>

            </ul>

        </nav>

    </aside>

    <!--
    ==================================
    MAIN CONTENT
    ==================================
    -->

    <main class="main-content">

        <!--
        TOP NAVBAR

        Search
        Theme Toggle
        Notifications
        -->

        <header class="topbar">

            <input
                type="text"
                id="search"
                placeholder="Search Bitcoin, Ethereum..." />

            <button id="themeToggle">

                🌙 Dark Mode

            </button>

        </header>

        <!--
        ==================================
        STATS CARDS
        ==================================

        Future:
        Market Cap
        Volume
        BTC Dominance
        -->

        <section class="stats">

            <div class="stat-card">

                Market Cap

            </div>

            <div class="stat-card">

                24h Volume

            </div>

            <div class="stat-card">

                BTC Dominance

            </div>

            <div class="stat-card">

                Fear & Greed

            </div>

        </section>

        <!--
        ==================================
        MAIN CHART SECTION
        ==================================

        Current chart
        yahan render hoga.
        -->

        <section class="chart-section">

            <canvas id="priceChart"></canvas>

        </section>

        <!--
        Coin Details

        Search result
        yahan aayega.
        -->

        <section id="results">

        </section>

    </main>

    <!--
    ==================================
    RIGHT PANEL
    ==================================

    Future:
    Top Coins
    Top News
    Converter
    -->

    <aside class="right-panel">

        <h3>🔥 Watchlist</h3>

        <ul id="favList"></ul>

        <h3>📈 Top Movers</h3>

        <ul id="gainersList"></ul>

        <ul id="losersList"></ul>

    </aside>

    <!--
    Loader

    API loading spinner
    -->

    <div id="loader"
         class="loader hidden">

    </div>

    <!--
    Dashboard Logic
    -->

    <script
        type="module"
        src="../js/dashboard.js">

    </script>

</body>

</html>
